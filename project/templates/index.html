<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Pulse Monitor</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-effect"></div>
    
    <div class="container">
        <header>
            <div class="logo-pulse"></div>
            <div>
                <h1>Earth Pulse</h1>
                <p>Real-Time Landslide Risk Analytics</p>
            </div>
        </header>

        <main class="dashboard">
            <section class="glass-card input-section">
                <h2>Sensor Input</h2>
                <p class="subtitle">Record manual readings or trigger mock sensor data</p>
                
                <form id="sensorForm">
                    <div class="input-group">
                        <label for="soil">Soil Moisture Content (%)</label>
                        <input type="number" id="soil" name="soil" required min="0" step="any" placeholder="e.g. 45.5">
                    </div>
                    
                    <div class="input-group">
                        <label for="water">Groundwater Level (mm)</label>
                        <input type="number" id="water" name="water" required min="0" step="any" placeholder="e.g. 120">
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <span>Analyze Environment</span>
                    </button>
                </form>

                <div id="riskResult" class="hidden">
                    <div class="risk-label">Current Danger Level</div>
                    <div class="risk-value">
                        <span id="riskScore">0.00</span>
                        <div id="riskStatus" class="status-badge indicator-safe">Status Loading</div>
                    </div>
                </div>
            </section>

            <section class="glass-card data-section">
                <h2>Historical Diagnostics</h2>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Soil (%)</th>
                                <th>Water (mm)</th>
                                <th>Calculated Risk</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- Pulled from database -->
                            <tr>
                                <td colspan="4" class="empty-state">Loading latest readings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
